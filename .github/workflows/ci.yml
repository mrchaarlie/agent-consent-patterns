name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The site resolves @agentconsent/react to its built dist/ types, so the
      # library must be built before the site can typecheck, lint, or build.
      - name: Build library
        run: pnpm --filter @agentconsent/react build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests (library)
        run: pnpm --filter @agentconsent/react test

      - name: Build (library + site)
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm --filter @agentconsent/site exec playwright install --with-deps chromium

      - name: Smoke tests (site)
        run: pnpm --filter @agentconsent/site test
