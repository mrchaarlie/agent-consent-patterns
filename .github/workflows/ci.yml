name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The site resolves @agentconsent/react to its built dist/ types, so the
      # library must be built before the site can typecheck, lint, or build.
      - name: Build library
        run: pnpm --filter @agentconsent/react build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests (library)
        run: pnpm --filter @agentconsent/react test

      - name: Build (library + site)
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm --filter @agentconsent/site exec playwright install --with-deps chromium

      - name: Smoke tests (site)
        run: pnpm --filter @agentconsent/site test
