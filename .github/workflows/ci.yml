name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The site resolves @agentconsent/react to its built dist/ types, so the
      # library must be built before the site can typecheck, lint, or build.
      - name: Build library
        run: pnpm --filter @agentconsent/react build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests (library)
        run: pnpm --filter @agentconsent/react test

      - name: Build (library + site)
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm --filter @agentconsent/site exec playwright install --with-deps chromium

      - name: Smoke tests (site)
        run: pnpm --filter @agentconsent/site test
