name: Publish React library

on:
  push:
    tags: ["react-v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build library
        run: pnpm --filter @agentconsent/react build
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Install Playwright browsers
        run: pnpm --filter @agentconsent/site exec playwright install --with-deps chromium
      - name: Test
        run: pnpm test
      - name: Check published package contents
        run: npm pack --dry-run
        working-directory: packages/react

  publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - name: Install npm CLI for Trusted Publishing
        run: |
          curl -fsSL -o npm.tgz https://registry.npmjs.org/npm/-/npm-11.5.1.tgz
          echo "83b06a00dae2a8e5d72dc951ddf56a2e0dbf2cc1  npm.tgz" | sha1sum -c -
          npm install --global ./npm.tgz
          rm npm.tgz
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build library
        run: pnpm --filter @agentconsent/react build
      - name: Confirm tag matches package version
        run: |
          package_version="$(node -p "require('./package.json').version")"
          test "${GITHUB_REF_NAME#react-v}" = "$package_version"
        working-directory: packages/react
      - name: Publish with npm Trusted Publishing
        run: npm publish
        working-directory: packages/react
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: packages/react/dist/**
